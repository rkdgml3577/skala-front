<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · SKALA</title>
</head>
<body>
  <h1>👤 회원가입</h1>
  <p>SKALA-FRONT 회원가입을 환영합니다.</p>

  <!-- form: action=signUpResult.html, method=get -->
  <form action="signUpResult.html" method="get" id="signupForm">

    <!-- 계정 정보 -->
    <fieldset>
      <legend>계정 정보</legend>

      <div class="field">
        <label for="userId">아이디 <span class="req">*</span></label>
        <input type="text" id="userId" name="userId"
               placeholder="4~15자 영문/숫자" required
               pattern="[A-Za-z0-9]{4,15}" />
      </div>

      <div class="field">
        <label for="password">비밀번호 <span class="req">*</span></label>
        <input type="password" id="password" name="password"
               placeholder="8자 이상 입력" required minlength="8" />
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <div class="email-row">
          <input type="text" id="email" name="emailId" placeholder="example" />
          <span class="at" aria-hidden="true">@</span>
          <!-- select / option -->
          <select name="emailDomain" id="emailDomain" aria-label="이메일 도메인">
            <option value="">직접 입력</option>
            <option value="gmail.com">gmail.com</option>
            <option value="naver.com">naver.com</option>
            <option value="daum.net">daum.net</option>
          </select>
        </div>
      </div>
    </fieldset>
    <!-- 개인 프로필 정보 -->
    <fieldset>
      <legend>개인 프로필 정보</legend>

      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="홍길동" />
      </div>

      <div class="field">
        <label for="birth">생년월일</label>
        <input type="date" id="birth" name="birth" />
      </div>

      <div class="field">
        <label>성별</label>
        <div class="options">
          <label class="opt"><input type="radio" name="gender" value="male" checked /> 남성</label>
          <label class="opt"><input type="radio" name="gender" value="female" /> 여성</label>
          <label class="opt"><input type="radio" name="gender" value="none" /> 선택안함</label>
        </div>
      </div>

      <div class="field">
        <label>관심 분야 (중복 선택 가능)</label>
        <div class="checks">
          <label class="opt"><input type="checkbox" name="interest" value="frontend" /> 웹 프론트엔드 (Vue.js/HTML)</label>
          <label class="opt"><input type="checkbox" name="interest" value="uiux" /> UI/UX 디자인 표준</label>
          <label class="opt"><input type="checkbox" name="interest" value="backend" /> 백엔드 &amp; 데이터베이스</label>
          <label class="opt"><input type="checkbox" name="interest" value="cloud" /> 클라우드 &amp; 인프라</label>
        </div>
      </div>

      <div class="field">
        <label for="route">가입 경로</label>
        <select name="route" id="route">
          <option value="">-- 선택해 주세요 --</option>
          <option value="search">검색엔진</option>
          <option value="sns">SNS</option>
          <option value="friend">지인 추천</option>
          <option value="etc">기타</option>
        </select>
      </div>
    </fieldset>

  </form>
</body>
</html>
