<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · SKALA</title>
  <style>
    :root {
      --bg: #0d1117; --bg-2: #161b26;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08); --border-focus: #7b5cff;
      --text: #e8edf7; --text-dim: #8b96ad;
      --accent: #ff6a13; --purple: #7b5cff; --cyan: #2ee6c6; --accent-2: #38bdf8;
      --danger: #ff5c6c; --ok: #2ee6c6;
      --glow: rgba(123, 92, 255, 0.2);
      --font: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh; padding: 2rem 1rem;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background:
        radial-gradient(600px circle at 15% 10%, var(--glow), transparent 40%),
        radial-gradient(500px circle at 85% 90%, rgba(46,230,198,0.1), transparent 40%);
      z-index: 0; pointer-events: none;
    }
    form, h1, p { position: relative; z-index: 1; }
    body > h1, body > p { text-align: center; max-width: 560px; margin: 0 auto; }
    body > h1 {
      font-size: 2rem; font-weight: 800; margin-top: 0.5rem;
      background: linear-gradient(120deg, var(--text), var(--purple));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    body > p { color: var(--text-dim); margin-bottom: 2rem; }

    form { max-width: 560px; margin: 0 auto; }

    fieldset {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    legend {
      padding: 0 0.6rem; font-weight: 700; font-size: 1.05rem;
      color: var(--cyan); letter-spacing: 0.02em;
    }
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: var(--text); font-weight: 600; }
    label .req { color: var(--accent); margin-left: 0.2rem; }

    input[type="text"], input[type="password"], input[type="email"],
    input[type="date"], select, textarea {
      width: 100%; padding: 0.7rem 0.9rem;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font: inherit; font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--glow);
    }
    textarea { resize: vertical; min-height: 100px; }

    .email-row { display: flex; align-items: center; gap: 0.5rem; }
    .email-row .at { color: var(--text-dim); font-weight: 700; }
    .email-row select { width: auto; flex: 1; }

    .options { display: flex; flex-wrap: wrap; gap: 1rem; }
    .opt {
      display: inline-flex; align-items: center; gap: 0.4rem;
      cursor: pointer; font-size: 0.9rem; color: var(--text-dim);
    }
    .opt input { accent-color: var(--purple); width: 16px; height: 16px; cursor: pointer; }
    .checks { display: flex; flex-direction: column; gap: 0.6rem; }

    .counter { text-align: right; font-size: 0.78rem; color: var(--text-dim); margin-top: 0.3rem; }

    .btn-row { display: flex; gap: 0.8rem; margin-top: 0.5rem; }
    button {
      flex: 1; padding: 0.85rem; border-radius: 10px; font: inherit;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      border: 1px solid transparent; transition: transform 0.15s ease;
    }
    button:hover { transform: translateY(-2px); }
    button[type="submit"] {
      background: linear-gradient(120deg, var(--purple), var(--accent-2)); color: #fff;
    }
    button[type="reset"] {
      background: var(--surface); border-color: var(--border); color: var(--text-dim);
    }

    @media (max-width: 600px) {
      .email-row { flex-wrap: wrap; }
      .email-row input, .email-row select { width: 100%; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    .hint { font-size: 0.78rem; margin-top: 0.35rem; min-height: 1em; }
    .hint.ok { color: var(--ok); }
    .hint.bad { color: var(--danger); }
    .hint.dim { color: var(--text-dim); }
    .strength { display: flex; gap: 4px; margin-top: 0.4rem; }
    .strength span { flex: 1; height: 4px; background: var(--bg-2); border-radius: 999px; transition: background 0.3s ease; }
  </style>
</head>
<body>
  <h1>👤 회원가입</h1>
  <p>SKALA-FRONT 회원가입을 환영합니다.</p>

  <!-- form: action=signUpResult.html, method=get -->
  <form action="signUpResult.html" method="get" id="signupForm">

    <!-- 계정 정보 -->
    <fieldset>
      <legend>계정 정보</legend>

      <div class="field">
        <label for="userId">아이디 <span class="req">*</span></label>
        <input type="text" id="userId" name="userId"
               placeholder="4~15자 영문/숫자" required
               pattern="[A-Za-z0-9]{4,15}" />
        <p class="hint dim" id="idHint">영문과 숫자로 4~15자</p>

      </div>

      <div class="field">
        <label for="password">비밀번호 <span class="req">*</span></label>
        <input type="password" id="password" name="password"
               placeholder="8자 이상 입력" required minlength="8" />
        <div class="strength" aria-hidden="true">
            <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
          </div>
          <p class="hint dim" id="pwHint">8자 이상 입력해 주세요</p>
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <div class="email-row">
          <input type="text" id="email" name="emailId" placeholder="example" />
          <span class="at" aria-hidden="true">@</span>
          <!-- select / option -->
          <select name="emailDomain" id="emailDomain" aria-label="이메일 도메인">
            <option value="">직접 입력</option>
            <option value="gmail.com">gmail.com</option>
            <option value="naver.com">naver.com</option>
            <option value="daum.net">daum.net</option>
          </select>
        </div>
      </div>
    </fieldset>
    <!-- 개인 프로필 정보 -->
    <fieldset>
      <legend>개인 프로필 정보</legend>

      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="홍길동" />
      </div>

      <div class="field">
        <label for="birth">생년월일</label>
        <input type="date" id="birth" name="birth" />
      </div>

      <div class="field">
        <label>성별</label>
        <div class="options">
          <label class="opt"><input type="radio" name="gender" value="male" checked /> 남성</label>
          <label class="opt"><input type="radio" name="gender" value="female" /> 여성</label>
          <label class="opt"><input type="radio" name="gender" value="none" /> 선택안함</label>
        </div>
      </div>

      <div class="field">
        <label>관심 분야 (중복 선택 가능)</label>
        <div class="checks">
          <label class="opt"><input type="checkbox" name="interest" value="frontend" /> 웹 프론트엔드 (Vue.js/HTML)</label>
          <label class="opt"><input type="checkbox" name="interest" value="uiux" /> UI/UX 디자인 표준</label>
          <label class="opt"><input type="checkbox" name="interest" value="backend" /> 백엔드 &amp; 데이터베이스</label>
          <label class="opt"><input type="checkbox" name="interest" value="cloud" /> 클라우드 &amp; 인프라</label>
        </div>
      </div>

      <div class="field">
        <label for="route">가입 경로</label>
        <select name="route" id="route">
          <option value="">-- 선택해 주세요 --</option>
          <option value="search">검색엔진</option>
          <option value="sns">SNS</option>
          <option value="friend">지인 추천</option>
          <option value="etc">기타</option>
        </select>
      </div>
    </fieldset>
    <!-- 자기소개 -->
    <fieldset>
      <legend>자기소개</legend>
      <div class="field">
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
        <!-- textarea -->
        <textarea id="intro" name="intro" maxlength="200"
                  placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
        <div class="counter"><span id="introCount">0</span> / 200</div>
      </div>
    </fieldset>

    <!-- submit / reset -->
    <div class="btn-row">
      <button type="submit">동의하고 회원가입</button>
      <button type="reset">다시 작성</button>
    </div>
  </form>
</body>
</html>
