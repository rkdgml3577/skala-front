<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 여행지 · SKALA</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    :root {
      --glow: rgba(56, 189, 248, 0.2);
    }
    body {
        padding: 2rem 1rem;   /* 이 페이지만의 여백 */

    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background:
        radial-gradient(600px circle at 15% 5%, var(--glow), transparent 40%),
        radial-gradient(500px circle at 85% 95%, rgba(123,92,255,0.1), transparent 40%);
      z-index: 0; pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 {
      font-size: 1.9rem; font-weight: 800;
      background: linear-gradient(120deg, var(--text), var(--cyan));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    header p { color: var(--text-dim); margin-top: 0.4rem; }
    section { margin-bottom: 2.5rem; }
    section > h2 {
      font-size: 1.2rem; font-weight: 700; color: var(--cyan);
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
    }
    figure {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem;
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    figure.in { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      figure { opacity: 1; transform: none; transition: none; }
    }
    figure img, figure video { width: 100%; height: auto; display: block; }
    figure img { cursor: zoom-in; transition: transform 0.4s ease; }
    figure img:hover { transform: scale(1.03); }
    .lightbox {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9);
      display: flex; align-items: center; justify-content: center; padding: 2rem;
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img { max-width: 90%; max-height: 85%; border-radius: 12px; }
    .lightbox .close {
      position: absolute; top: 1.5rem; right: 2rem; font-size: 2rem;
      color: #fff; cursor: pointer; background: none; border: none;
    }
    figcaption { padding: 0.9rem 1.1rem; color: var(--text-dim); font-size: 0.95rem; }
    figcaption strong { color: var(--text); }
    .player {
      margin-top: 1.5rem; padding: 1.2rem 1.4rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      display: flex; align-items: center; gap: 1rem;
    }
    .play-btn {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 1.1rem;
      background: linear-gradient(120deg, var(--purple), var(--accent-2));
      color: #fff; display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease;
    }
    .play-btn:hover { transform: scale(1.08); }
    .player-body { flex: 1; min-width: 0; }
    .player-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
    .player-title span { color: var(--cyan); }
    .seek-row { display: flex; align-items: center; gap: 0.6rem; }
    .seek {
      flex: 1; height: 6px; background: var(--bg-2); border-radius: 999px;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .seek .played {
      position: absolute; left: 0; top: 0; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--purple), var(--cyan)); border-radius: 999px;
    }
    .time { font-size: 0.75rem; color: var(--text-dim); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    footer { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-top: 2rem; }
    footer a { color: var(--accent-2); }
  </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>🌏 나의 여행 앨범 🎵</h1>
            <p>사진, 음악, 영상으로 담은 나의 여행 기록입니다.</p>

            <!-- 필수: audio + source -->
            <div class="player">
                <button class="play-btn" id="playBtn" aria-label="재생">▶</button>
                <div class="player-body">
                <div class="player-title">🎵 <span>여행의 테마</span> — 배경 음악</div>
                <div class="seek-row">
                    <div class="seek" id="seek"><div class="played" id="played"></div></div>
                    <span class="time" id="time">0:00 / 0:00</span>
                </div>
                </div>
                <!-- controls 없음 (커스텀이라) -->
                <audio id="audio" preload="metadata">
                <source src="../media/travel-music.mp3" type="audio/mpeg" />
                이 브라우저는 오디오 재생을 지원하지 않습니다.
                </audio>
            </div>
        </header>

        <!-- 사진 갤러리 -->
        <section>
            <h2>📷 여행 사진</h2>
            <!-- 필수: img -->
            <figure>
            <img src="../media/paris.jpg" alt="파리의 길거리 풍경" />
            <figcaption><strong>파리</strong> (2018년)</figcaption>
            </figure>
            <figure>
            <img src="../media/cambodia.jpg" alt="캄보디아 공항 도착 사진" />
            <figcaption><strong>캄보디아</strong> (2023년)</figcaption>
            </figure>
            <figure>
            <img src="../media/kyoto.jpg" alt="교토의 길거리 풍경" />
            <figcaption><strong>교토</strong> (2024년)</figcaption>
            </figure>
        </section>

        <!-- 비디오 -->
        <section>
            <h2>🎬 나의 여행 브이로그</h2>
            <!-- 필수: video + source -->
            <figure>
            <video controls poster="../media/video-thumb.jpg">
                <source src="../media/travel-video.mp4" type="video/mp4" />
                이 브라우저는 비디오 재생을 지원하지 않습니다.
            </video>
            <figcaption><strong>태국 여행 브이로그</strong> 🎼</figcaption>
            </figure>
        </section>

        <footer>
            <p><a href="index.html?skipIntro=1">← 홈으로 돌아가기</a></p>
        </footer>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="close" id="lightboxClose" aria-label="닫기">✕</button>
        <img id="lightboxImg" src="" alt="확대 이미지" />
    </div>
<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const played = document.getElementById('played');
    const seek = document.getElementById('seek');
    const timeLabel = document.getElementById('time');

    function fmt(sec) {
      if (isNaN(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = String(Math.floor(sec % 60)).padStart(2, '0');
      return `${m}:${s}`;
    }
    playBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); playBtn.textContent = '❚❚'; }
      else { audio.pause(); playBtn.textContent = '▶'; }
    });
    audio.addEventListener('timeupdate', () => {
      const pct = (audio.currentTime / audio.duration) * 100 || 0;
      played.style.width = pct + '%';
      timeLabel.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    });
    audio.addEventListener('loadedmetadata', () => {
      timeLabel.textContent = `0:00 / ${fmt(audio.duration)}`;
    });
    audio.addEventListener('ended', () => { playBtn.textContent = '▶'; played.style.width = '0%'; });
    // 스크롤 등장 애니메이션
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('in');
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('figure').forEach(el => observer.observe(el));
    seek.addEventListener('click', (e) => {
      const rect = seek.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });
    // 사진 라이트박스
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    document.querySelectorAll('figure img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('open');
      });
    });
    function closeLightbox() { lightbox.classList.remove('open'); }
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
