<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입 완료 · SKALA</title>
</head>
<body>
  <div class="card">
    <!-- 성공 헤더 -->
    <div class="success-head">
      <span class="success-icon" aria-hidden="true">🎉</span>
      <h1>회원가입을 진심으로 축하합니다!</h1>
      <p class="welcome">
        <strong id="welcomeName">SKALA-FRONT</strong> 회원이 되신 것을 환영합니다.
      </p>
    </div>

    <hr />

    <!-- 안내 사항 -->
    <section>
      <h2>안내 사항</h2>
      <ul class="notice">
        <li>입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.</li>
        <li>보안을 위해 첫 로그인 후 비밀번호를 다시 한번 확인해 주세요.</li>
        <li>작성하신 프로필 정보는 마이페이지에서 언제든지 수정이 가능합니다.</li>
      </ul>
    </section>
  </div>
</body>
</html>
