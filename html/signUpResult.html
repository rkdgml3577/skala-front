<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입 완료 · SKALA</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    :root {
      --glow: rgba(46, 230, 198, 0.2);
    }
    body {
      padding: 2rem 1rem;
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background:
        radial-gradient(700px circle at 50% 0%, var(--glow), transparent 45%),
        radial-gradient(500px circle at 85% 90%, rgba(123,92,255,0.12), transparent 40%);
      z-index: 0; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      max-width: 560px; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem;
    }
    .success-head { text-align: center; margin-bottom: 2rem; }
    .success-icon {
      font-size: 3.5rem; display: inline-block;
      animation: pop 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.28);
    }
    @keyframes pop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .success-head h1 {
      font-size: 1.8rem; font-weight: 800; margin-top: 0.8rem;
      background: linear-gradient(120deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .success-head .welcome { color: var(--text-dim); margin-top: 0.5rem; }
    .success-head .welcome strong { color: var(--accent); }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.8rem 0; }
    section h2 {
      font-size: 1.15rem; font-weight: 700; color: var(--cyan);
      margin-bottom: 0.9rem;
    }
    section > p { color: var(--text-dim); margin-bottom: 1rem; }
    .notice { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
    .notice li { position: relative; padding-left: 1.6rem; color: var(--text-dim); }
    .notice li::before {
      content: "✓"; position: absolute; left: 0;
      color: var(--cyan); font-weight: 800;
    }
    .links { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
    .links a {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.9rem 1.1rem;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 12px; text-decoration: none; color: var(--text);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .links a:hover {
      transform: translateX(4px); border-color: var(--purple);
      background: rgba(123,92,255,0.08);
    }
    .links .emoji { font-size: 1.3rem; }
    .links .arrow { margin-left: auto; color: var(--text-dim); }
    .links a.pending .badge {
      margin-left: auto; font-size: 0.7rem; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 999px; padding: 0.1rem 0.5rem;
    }
    .home-btn {
      display: block; text-align: center; margin-top: 2rem;
      padding: 0.9rem; border-radius: 12px; text-decoration: none; font-weight: 700;
      background: linear-gradient(120deg, var(--purple), var(--accent-2)); color: #fff;
      transition: transform 0.15s ease;
    }
    .home-btn:hover { transform: translateY(-2px); }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="card">
    <!-- 성공 헤더 -->
    <div class="success-head">
      <span class="success-icon" aria-hidden="true">🎉</span>
      <h1>회원가입을 진심으로 축하합니다!</h1>
      <p class="welcome">
        <strong id="welcomeName">SKALA-FRONT</strong> 회원이 되신 것을 환영합니다.
      </p>
    </div>

    <hr />

    <!-- 안내 사항 -->
    <section>
      <h2>안내 사항</h2>
      <ul class="notice">
        <li>입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.</li>
        <li>보안을 위해 첫 로그인 후 비밀번호를 다시 한번 확인해 주세요.</li>
        <li>작성하신 프로필 정보는 마이페이지에서 언제든지 수정이 가능합니다.</li>
      </ul>
    </section>
    <hr />

    <!-- 이동하기 -->
    <section>
      <h2>이동하기</h2>
      <p>아래 링크를 클릭하면 이전에 작성한 다른 페이지로 이동할 수 있습니다.</p>
      <ul class="links">
        <li>
          <a href="myProfile.html">
            <span class="emoji" aria-hidden="true">🙋</span>
            나의 프로필 보기
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </li>
        <li>
          <a href="myClass.html">
            <span class="emoji" aria-hidden="true">📅</span>
            나의 수업 시간표 보기
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </li>
        <li>
          <!-- myHoliday.html은 아직 미생성 -->
          <a href="myHoliday.html" class="pending">
            <span class="emoji" aria-hidden="true">🏖️</span>
            나의 휴일 계획 보기
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </li>
      </ul>
    </section>

    <!-- 홈으로 -->
    <a href="index.html?skipIntro=1" class="home-btn">홈으로 돌아가기</a>
  </div>
  <script>
    /* signUp에서 get으로 넘어온 아이디를 URL에서 읽어 인사에 표시 */
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    if (userId) {
      document.getElementById('welcomeName').textContent = userId + '님';
    }
  </script>
</body>
</html>
